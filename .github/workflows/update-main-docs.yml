name: Update the Main Docs Repository

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  update-main-docs:
    uses: validityBase/vbase-github-actions/.github/workflows/publish-docs.yml@v1
    with:
      python-version: "3.11"
      requirements-files: |
        docs/requirements.txt
      pre-publish-command: sphinx-build -b markdown docs/ docs/_build/markdown
      source-docs-path: docs/_build/markdown
      target-repository-branch: main
      resolve-absolute-links-repos: |
        vbase-py-tools
    secrets:
      DOCS_REPO_ACCESS_TOKEN: ${{ secrets.DOCS_REPO_ACCESS_TOKEN }}
