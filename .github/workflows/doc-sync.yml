name: Doc Sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Analysis scope"
        type: choice
        required: true
        default: from_last_run
        options:
          - fresh_check
          - from_last_run
          - last_1_week
          - last_1_month
          - last_2_months
          - last_3_months
          - last_5_months
          - last_6_months
          - last_1_year
          - last_2_years

jobs:
  # ── Job 1: Validate cross-repo credentials before doing any real work ──────
  credential-check:
    name: Validate credentials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        # actions/setup-python v5.3.0
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2f
        with:
          python-version: "3.11"

      - name: Validate product repo access
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PRODUCT_REPO_PAT is optional — omit it when the product repo is public.
          # When set, it is used instead of GITHUB_TOKEN for product repo API calls.
          PRODUCT_REPO_PAT: ${{ secrets.PRODUCT_REPO_PAT }}
          PRODUCT_REPO: ${{ vars.PRODUCT_REPO }}
        run: python -m scripts.main --credential-check
        working-directory: .github

  # ── Job 2: Analyse diffs and report if docs need updating ─────────────────
  doc-sync:
    name: Analyse docs
    needs: credential-check
    runs-on: ubuntu-latest
    permissions:
      contents: read       # read repo files for doc content loading
      actions: read        # read workflow runs via the Actions API
    steps:
      - name: Checkout
        # actions/checkout v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        # actions/setup-python v5.3.0
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2f
        with:
          python-version: "3.11"

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run doc-sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PRODUCT_REPO_PAT is optional for public product repos.
          PRODUCT_REPO_PAT: ${{ secrets.PRODUCT_REPO_PAT }}
          PRODUCT_REPO: ${{ vars.PRODUCT_REPO }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'github-models' }}
          GITHUB_MODEL: ${{ vars.GITHUB_MODEL || 'gpt-4o' }}
          # Optional overrides for other providers:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}
          MODE: ${{ inputs.mode }}
        run: python -m scripts.main --mode "$MODE"
        working-directory: .github
