name: Python Dependency Locks

on:
  pull_request:
    paths:
      - "requirements*.in"
      - "requirements*.txt"
      - "docs/requirements*.in"
      - "docs/requirements*.txt"
      - "setup.py"
      - ".github/workflows/python-dependency-locks.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lock-tooling:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # actions/checkout v5.0.1

      - name: Install lock tooling
        uses: validityBase/vbase-github-actions/.github/actions/setup-python-deps@v1
        with:
          requirements-files: |
            requirements-lock.txt
          python-version: "3.11"
          require-hashes: "true"

      - name: Regenerate lock tooling lock
        run: pip-compile --strip-extras --no-annotate --allow-unsafe --generate-hashes -o requirements-lock.txt requirements-lock.in

      - name: Verify lock tooling lock is committed
        run: git diff --exit-code -- requirements-lock.txt

  root-locks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # actions/checkout v5.0.1

      - name: Install lock tooling
        uses: validityBase/vbase-github-actions/.github/actions/setup-python-deps@v1
        with:
          requirements-files: |
            requirements-lock.txt
          python-version: "3.11"
          require-hashes: "true"

      - name: Regenerate root dependency locks
        run: |
          pip-compile --strip-extras --no-annotate --generate-hashes -o requirements.txt requirements.in
          pip-compile --strip-extras --no-annotate --allow-unsafe --generate-hashes -o requirements-dev.txt requirements-dev.in
          pip-compile --strip-extras --no-annotate --generate-hashes -o requirements-win.txt requirements-win.in

      - name: Verify root dependency locks are committed
        run: git diff --exit-code -- requirements.txt requirements-dev.txt requirements-win.txt

      - name: Install development dependencies
        uses: validityBase/vbase-github-actions/.github/actions/setup-python-deps@v1
        with:
          requirements-files: |
            requirements-dev.txt
          python-version: "3.11"
          require-hashes: "true"

      - name: Install package metadata
        run: python -m pip install --no-deps --no-build-isolation -e .

      - name: Check installed dependencies
        run: python -m pip check

  docs-locks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # actions/checkout v5.0.1

      - name: Install lock tooling
        uses: validityBase/vbase-github-actions/.github/actions/setup-python-deps@v1
        with:
          requirements-files: |
            requirements-lock.txt
          python-version: "3.11"
          require-hashes: "true"

      - name: Regenerate docs dependency lock
        run: pip-compile --strip-extras --no-annotate --generate-hashes -o docs/requirements.txt docs/requirements.in

      - name: Verify docs dependency lock is committed
        run: git diff --exit-code -- docs/requirements.txt

      - name: Install docs dependencies
        uses: validityBase/vbase-github-actions/.github/actions/setup-python-deps@v1
        with:
          requirements-files: |
            docs/requirements.txt
          python-version: "3.11"
          require-hashes: "true"
